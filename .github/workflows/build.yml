name: Build & Release SPARK

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: node ./node_modules/electron-builder/out/cli/cli.js --win --x64 --verbose
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SPARK-Windows
          path: dist/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG
        run: node ./node_modules/electron-builder/out/cli/cli.js --mac --verbose
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SPARK-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SPARK-Windows
          path: ./artifacts/win

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SPARK-macOS
          path: ./artifacts/mac

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SPARK ${{ github.ref_name }}"
          body: |
            ## SPARK ${{ github.ref_name }}
            
            ### Windows
            - Скачайте `SPARK-Setup.exe` и запустите
            
            ### macOS
            - Скачайте `SPARK.dmg`, откройте и перетащите SPARK в Applications
            
            ### Веб-версия
            - https://spark-ead35.web.app
          draft: false
          prerelease: false
          files: |
            ./artifacts/win/*
            ./artifacts/mac/*
          fail_on_unmatched_files: false
